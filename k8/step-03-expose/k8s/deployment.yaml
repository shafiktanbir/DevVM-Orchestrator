apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  labels:
    app: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: server
          image: k8-curriculum-hello:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
